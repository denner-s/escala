<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Escala Profissional</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
* { box-sizing: border-box; }

body {
  font-family: 'Segoe UI', sans-serif;
  margin: 0;
  padding: 15px;

  background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
  url('https://media.licdn.com/dms/image/v2/D4D22AQFCoRw91-9yRQ/feedshare-shrink_800/feedshare-shrink_800/0/1698771369284?e=2147483647&v=beta&t=bYjEzHz9vK8UAwRRrobVF5MiJLJoLlOL-19CzYiJu4I');

  background-size: cover;
  background-position: center;
  background-attachment: fixed;
  text-align: center;
}

/* CONTAINER */
.container {
  background: rgba(255,255,255,0.95);
  padding: 20px;
  border-radius: 12px;
  max-width: 500px;
  margin: auto;
}

/* INPUTS */
input, select {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
  border-radius: 6px;
  border: 1px solid #ccc;
}

.linha-form {
  display: flex;
  gap: 5px;
}

.linha-form input,
.linha-form select {
  flex: 1;
}

/* BOTÕES */
button {
  width: 100%;
  padding: 12px;
  margin-top: 8px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.criar { background: #007bff; color: white; }
.gerar { background: #6f42c1; color: white; }
.baixar { background: #28a745; color: white; }
.compartilhar { background: #25d366; color: white; }

.remover {
  background: #dc3545;
  color: white;
  width: 45px;
}

/* CARD */
#card {
  margin: 20px auto;
  max-width: 400px;
  background: white;
  border-radius: 12px;
  padding: 20px;
}

.header {
  text-align: center;
}

.logo {
  width: 120px;
  margin-bottom: 10px;
}

.linha {
  display: flex;
  justify-content: space-between;
  border-bottom: 1px solid #eee;
  padding: 6px 0;
}

.linha small {
  color: #666;
  font-size: 12px;
}

@media (max-width: 480px) {
  .linha-form {
    flex-direction: column;
  }
}
</style>
</head>

<body>

<div class="container">
  <h2>📋 Escala de Trabalho</h2>

  <input type="date" id="data">

  <button class="criar" onclick="adicionarCampo()">➕ Adicionar colaborador</button>

  <div id="formColaboradores"></div>

  <button class="gerar" onclick="gerar()">Gerar Escala</button>
  <button class="baixar" onclick="baixar()">Baixar PNG</button>
  <button class="compartilhar" onclick="compartilhar()">Compartilhar</button>
</div>

<!-- CARD -->
<div id="card">
  <div class="header">
    <!-- LOGO OFICIAL (FUNCIONA COM DOWNLOAD) -->
    <img id="logo" class="logo"
    src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/5c/Assa%C3%AD_Atacadista_logo_2024.svg/960px-Assa%C3%AD_Atacadista_logo_2024.svg.png">

    <h3 id="titulo">Escala</h3>
    <small id="sub"></small>
  </div>
  <div id="lista"></div>
</div>

<script>
let contador = 0;

const colaboradores = [
  { nome: "Isabella", cargo: "Chefe de Seção (Empório)" },
  { nome: "Luiz", cargo: "Chefe de Seção (Açougue)" },
  { nome: "Igor", cargo: "Chefe de Seção (Perecíveis)" },
  { nome: "Marco", cargo: "Chefe de Seção (Perecíveis)" },
  { nome: "Denner", cargo: "Chefe de Seção (Mercearia)" },
  { nome: "Rafael", cargo: "Chefe de Seção (Mercearia)" },
  { nome: "Pierre", cargo: "Chefe de Seção (Mercearia)" },
  { nome: "Rodrigo", cargo: "Chefe de Seção (Prevenção)" },
  { nome: "Márcio", cargo: "Chefe de Seção (Prevenção)" },
  { nome: "Fábio", cargo: "Chefe de Seção (Padaria e Cafeteria)" },
  { nome: "Silvia", cargo: "Chefe ADM" },
];

function adicionarCampo() {
  const container = document.getElementById("formColaboradores");

  let options = `<option value="">Selecionar</option>`;
  colaboradores.forEach((c, i) => {
    options += `<option value="${i}">${c.nome}</option>`;
  });

  const div = document.createElement("div");
  div.classList.add("linha-form");
  div.id = "linha" + contador;

  div.innerHTML = `
    <select id="colab${contador}" onchange="preencherCargo(${contador})">${options}</select>
    <input id="cargo${contador}" readonly placeholder="Cargo">
    <input id="horario${contador}" placeholder="Horário">
    <button class="remover" onclick="removerCampo(${contador})">❌</button>
  `;

  container.appendChild(div);
  contador++;
}

function preencherCargo(id) {
  const select = document.getElementById(`colab${id}`);
  const cargo = document.getElementById(`cargo${id}`);
  cargo.value = select.value !== "" ? colaboradores[select.value].cargo : "";
}

function removerCampo(id) {
  document.getElementById("linha" + id)?.remove();
}

function gerar() {
  const lista = document.getElementById("lista");
  const data = document.getElementById("data").value;

  lista.innerHTML = "";

  const dataFormatada = data ? new Date(data).toLocaleDateString("pt-BR") : "---";

  document.getElementById("titulo").innerText = "Escala do Dia";
  document.getElementById("sub").innerText = dataFormatada;

  for (let i = 0; i < contador; i++) {
    const select = document.getElementById(`colab${i}`);
    const cargo = document.getElementById(`cargo${i}`);
    const horario = document.getElementById(`horario${i}`);

    if (!select || !cargo || !horario) continue;

    const nome = select.value !== "" ? colaboradores[select.value].nome : "-";

    lista.innerHTML += `
      <div class="linha">
        <span>
          <strong>${nome}</strong><br>
          <small>${cargo.value || "-"}</small>
        </span>
        <span>${horario.value || "-"}</span>
      </div>
    `;
  }
}

/* FUNÇÃO CORRETA PARA DOWNLOAD */
async function gerarCanvas() {
  return await html2canvas(document.querySelector("#card"), {
    scale: 3,
    useCORS: true,
    allowTaint: false
  });
}

async function baixar() {
  const canvas = await gerarCanvas();
  const link = document.createElement("a");
  link.download = "escala.png";
  link.href = canvas.toDataURL();
  link.click();
}

async function compartilhar() {
  const canvas = await gerarCanvas();

  canvas.toBlob(async (blob) => {
    const file = new File([blob], "escala.png", { type: "image/png" });

    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      await navigator.share({
        title: "Escala de Trabalho",
        files: [file]
      });
    } else {
      alert("Compartilhamento não suportado.");
    }
  });
}
</script>

</body>
</html>
