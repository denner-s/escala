<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Escala Profissional</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
* { box-sizing: border-box; }

body {
  font-family: 'Segoe UI', sans-serif;
  margin: 20px;
  min-height: 100vh;

  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;

  background: linear-gradient(135deg, #1f1f1f, #3a3a3a);
}

/* FORM */
.container {
  width: 100%;
  max-width: 420px;
  background: #ffffff;
  padding: 20px;
  border-radius: 14px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  margin-bottom: 20px;
}

h2 {
  margin-top: 0;
  text-align: center;
}

input, select {
  width: 100%;
  padding: 10px;
  margin: 6px 0;
  border-radius: 8px;
  border: 1px solid #ddd;
}

.linha-form {
  display: flex;
  gap: 6px;
}

.linha-form input,
.linha-form select {
  flex: 1;
}

/* BOTÕES */
button {
  width: 100%;
  padding: 12px;
  margin-top: 6px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-weight: 500;
}

.criar { background: #007bff; color: white; }
.gerar { background: #6f42c1; color: white; }
.baixar { background: #28a745; color: white; }
.compartilhar { background: #25d366; color: white; }

.remover {
  background: #dc3545;
  color: white;
  width: 45px;
}

/* CARD CENTRAL */
#card {
  width: 100%;
  max-width: 360px;
  background: #ffffff;
  border-radius: 16px;
  padding: 20px;
  box-shadow: 0 15px 40px rgba(0,0,0,0.25);
  text-align: left;
}

/* HEADER */
.header {
  text-align: center;
  margin-bottom: 10px;
}

.logo {
  width: 90px;
  margin-bottom: 8px;
}

#titulo {
  margin: 5px 0 0;
}

/* DATA DESTAQUE */
#dataDestaque {
  margin-top: 8px;
  font-size: 18px;
  font-weight: bold;
  background: #ff6400;
  color: white;
  padding: 6px 12px;
  border-radius: 8px;
  display: inline-block;
}

/* PLANTÃO */
#plantaoBox {
  display: none;
  background: #fff8e1;
  border-left: 4px solid #ffc107;
  padding: 10px;
  border-radius: 8px;
  margin: 12px 0;
}

#plantaoBox strong {
  display: block;
  margin-bottom: 4px;
}

/* LISTA */
.linha {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 0;
  border-bottom: 1px solid #f0f0f0;
}

.linha:last-child {
  border-bottom: none;
}

.nome {
  font-weight: 600;
}

.cargo {
  font-size: 12px;
  color: #777;
}

.horario {
  font-weight: 500;
}

/* MOBILE */
@media (max-width: 480px) {
  .linha-form {
    flex-direction: column;
  }
}
</style>
</head>

<body>

<div class="container">
  <h2>📋 Escala</h2>

  <input type="date" id="data">

  <select id="plantao">
    <option value="">Plantão (opcional)</option>
  </select>

  <button class="criar" onclick="adicionarCampo()">+ Colaborador</button>

  <div id="formColaboradores"></div>

  <button class="gerar" onclick="gerar()">Gerar</button>
  <button class="baixar" onclick="baixar()">Baixar</button>
  <button class="compartilhar" onclick="compartilhar()">Compartilhar</button>
</div>

<div id="card">
  <div class="header">
    <img class="logo"
    src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/5c/Assa%C3%AD_Atacadista_logo_2024.svg/960px-Assa%C3%AD_Atacadista_logo_2024.svg.png">

    <h3 id="titulo">Escala do Dia</h3>
    <div id="dataDestaque"></div>
  </div>

  <div id="plantaoBox">
    <strong>Plantão</strong>
    <div id="plantaoNome"></div>
  </div>

  <div id="lista"></div>
</div>

<script>
let contador = 0;

const colaboradores = [
  { nome: "Douglas", cargo: "Gerente" },
  { nome: "Leonardo", cargo: "Subgerente" },
  { nome: "Izabella", cargo: "Empório" },
  { nome: "Luis", cargo: "Açougue" },
  { nome: "Igor", cargo: "Perecíveis" },
  { nome: "Marco", cargo: "Perecíveis" },
  { nome: "Paulo", cargo: "Frente de Caixa" },
  { nome: "Leonardo", cargo: "Frente de Caixa" },
  { nome: "Wallace", cargo: "FLV" },
  { nome: "Milena", cargo: "Nutricionista" },
  { nome: "Denner", cargo: "Mercearia" },
  { nome: "Rafael", cargo: "Mercearia" },
  { nome: "Pierre", cargo: "Mercearia" },
  { nome: "Rodrigo", cargo: "Prevenção" },
  { nome: "Márcio", cargo: "Prevenção" },
  { nome: "Fábio", cargo: "Padaria" },
  { nome: "Silvia", cargo: "ADM" },
  { nome: "Marlon", cargo: "Depósito" },
  { nome: "Jean", cargo: "Manutenção" },
];

function carregarPlantao() {
  const select = document.getElementById("plantao");
  colaboradores.forEach((c, i) => {
    const option = document.createElement("option");
    option.value = i;
    option.textContent = c.nome;
    select.appendChild(option);
  });
}
carregarPlantao();

function adicionarCampo() {
  const container = document.getElementById("formColaboradores");

  let options = `<option value="">Selecionar</option>`;
  colaboradores.forEach((c, i) => {
    options += `<option value="${i}">${c.nome}</option>`;
  });

  const div = document.createElement("div");
  div.classList.add("linha-form");
  div.id = "linha" + contador;

  div.innerHTML = `
    <select id="colab${contador}" onchange="preencherCargo(${contador})">${options}</select>
    <input id="cargo${contador}" readonly placeholder="Setor">
    <input id="horario${contador}" placeholder="Horário">
    <button class="remover" onclick="removerCampo(${contador})">x</button>
  `;

  container.appendChild(div);
  contador++;
}

function preencherCargo(id) {
  const select = document.getElementById(`colab${id}`);
  const cargo = document.getElementById(`cargo${id}`);
  cargo.value = select.value !== "" ? colaboradores[select.value].cargo : "";
}

function removerCampo(id) {
  document.getElementById("linha" + id)?.remove();
}

function gerar() {
  const lista = document.getElementById("lista");
  const data = document.getElementById("data").value;
  const dataEl = document.getElementById("dataDestaque");

  lista.innerHTML = "";

  if (data) {
    const [ano, mes, dia] = data.split("-");
    const dataFormatada = new Date(ano, mes - 1, dia);

    dataEl.innerText = dataFormatada.toLocaleDateString("pt-BR");
  } else {
    dataEl.innerText = "";
  }

  const plantaoSelect = document.getElementById("plantao");
  const plantaoBox = document.getElementById("plantaoBox");
  const plantaoNome = document.getElementById("plantaoNome");

  if (plantaoSelect.value !== "") {
    const p = colaboradores[plantaoSelect.value];
    plantaoNome.innerHTML = `<strong>${p.nome}</strong><span class="cargo">${p.cargo}</span>`;
    plantaoBox.style.display = "block";
  } else {
    plantaoBox.style.display = "none";
  }

  for (let i = 0; i < contador; i++) {
    const select = document.getElementById(`colab${i}`);
    const cargo = document.getElementById(`cargo${i}`);
    const horario = document.getElementById(`horario${i}`);

    if (!select || !cargo || !horario) continue;

    const nome = select.value !== "" ? colaboradores[select.value].nome : "-";

    lista.innerHTML += `
      <div class="linha">
        <div>
          <div class="nome">${nome}</div>
          <div class="cargo">${cargo.value || ""}</div>
        </div>
        <div class="horario">${horario.value || "-"}</div>
      </div>
    `;
  }
}

async function gerarCanvas() {
  return await html2canvas(document.querySelector("#card"), {
    scale: 3,
    useCORS: true
  });
}

async function baixar() {
  const canvas = await gerarCanvas();
  const link = document.createElement("a");
  link.download = "escala.png";
  link.href = canvas.toDataURL();
  link.click();
}

async function compartilhar() {
  const canvas = await gerarCanvas();

  canvas.toBlob(async (blob) => {
    const file = new File([blob], "escala.png", { type: "image/png" });

    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      await navigator.share({
        title: "Escala",
        files: [file]
      });
    } else {
      alert("Não suportado.");
    }
  });
}
</script>

</body>
</html>
